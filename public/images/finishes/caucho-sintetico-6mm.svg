    <path d="M0 750h1400"/>
    <path d="M175 0v900"/>
    <path d="M350 0v900"/>
    <path d="M525 0v900"/>
    <path d="M700 0v900"/>
    <path d="M875 0v900"/>
    <path d="M1050 0v900"/>
