<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d6d2c9"/>
      <stop offset="50%" stop-color="#c2bdaf"/>
      <stop offset="100%" stop-color="#a9a293"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="8"/>
      <feColorMatrix type="saturate" values="0.25"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.16"/>
      </feComponentTransfer>
    </filter>
    <pattern id="strips" width="170" height="70" patternUnits="userSpaceOnUse">
      <rect width="170" height="70" fill="transparent"/>
      <rect x="0" y="0" width="160" height="14" rx="3" fill="#b8b1a0" opacity="0.45"/>
      <rect x="8" y="21" width="150" height="13" rx="3" fill="#a59d8a" opacity="0.52"/>
      <rect x="3" y="42" width="158" height="15" rx="3" fill="#8f8776" opacity="0.38"/>
    </pattern>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect width="1400" height="900" fill="url(#strips)"/>
  <g stroke="#e9e5da" stroke-width="3" opacity="0.55">
    <path d="M0 177h1400"/>
    <path d="M0 353h1400"/>
    <path d="M0 529h1400"/>
    <path d="M0 705h1400"/>
    <path d="M232 0v900"/>
    <path d="M465 0v900"/>
    <path d="M698 0v900"/>
    <path d="M931 0v900"/>
    <path d="M1164 0v900"/>
  </g>
  <rect width="1400" height="900" filter="url(#grain)"/>
</svg>
